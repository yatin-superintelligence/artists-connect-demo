<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0118">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Artist Circle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <style>
        #root {
            height: 100%;
            overflow-y: auto;
            overscroll-behavior-y: contain;
        }

        /* Hide scrollbar completely */
        ::-webkit-scrollbar {
            width: 0;
            display: none;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: transparent;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>

</head>

<body>
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('feeld-theme-preference');
                var themeColors = {
                    'Orange': '#2d120a',
                    'Pink': '#280514',
                    'Brown': '#1a120b',
                    'Dark': '#020005',
                    'Light': '#f9fafb'
                };
                var bgColor;
                if (saved && themeColors[saved]) {
                    bgColor = themeColors[saved];
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                    bgColor = '#f9fafb';
                } else {
                    bgColor = '#020005';
                }
                document.body.style.backgroundColor = bgColor;
                // Also update theme-color meta for status bar
                var metaTheme = document.querySelector('meta[name="theme-color"]');
                if (metaTheme) metaTheme.setAttribute('content', bgColor);
            } catch (e) {
                document.body.style.backgroundColor = '#020005';
            }
        })();
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
